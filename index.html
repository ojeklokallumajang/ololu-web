<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OLOLU Lumajang v1.0.1</title>
    <meta name="theme-color" content="#046A38" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      window.onerror = function(msg, url, line, col, error) {
        var errDiv = document.createElement('div');
        errDiv.style.position = 'fixed';
        errDiv.style.top = '0';
        errDiv.style.left = '0';
        errDiv.style.width = '100%';
        errDiv.style.height = '100%';
        errDiv.style.backgroundColor = '#fff';
        errDiv.style.zIndex = '999999';
        errDiv.style.padding = '20px';
        errDiv.style.textAlign = 'center';
        errDiv.innerHTML = '<h1 style="color:red">Sistem Error Fatal</h1><p>' + msg + '</p><p>Line: ' + line + '</p><button onclick="localStorage.clear();sessionStorage.clear();location.reload();" style="padding:10px 20px;background:green;color:white;border-radius:10px;border:none;">RESET APLIKASI</button>';
        document.body.appendChild(errDiv);
        return false;
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
