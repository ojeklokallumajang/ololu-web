<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OLOLU Lumajang - Ojek & Layanan Pengantaran Nusantara</title>
    <meta name="theme-color" content="#046A38" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      window.onerror = function(msg, url, line, col, error) {
        alert("🚨 CRITICAL ERROR:\n" + msg + "\nAt: " + url + ":" + line + ":" + col);
        return false;
      };
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('[OLOLU PWA] ServiceWorker registered with scope:', registration.scope);
            })
            .catch((error) => {
              console.error('[OLOLU PWA] ServiceWorker registration failed:', error);
            });
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
