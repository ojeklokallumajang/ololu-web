<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="100" fill="#046A38" />
  <!-- Golden border pattern -->
  <rect x="20" y="20" width="472" height="472" rx="80" fill="none" stroke="#D4AF37" stroke-width="8" stroke-opacity="0.3" />
  
  <!-- Sleek motorcycle / courier icon in Gold -->
  <g transform="translate(116, 96) scale(3.5)" stroke="#D4AF37" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Wheel 1 -->
    <circle cx="15" cy="55" r="10" />
    <!-- Wheel 2 -->
    <circle cx="60" cy="55" r="10" />
    <!-- Frame -->
    <path d="M 15 55 L 30 30 L 48 30 L 60 55" />
    <!-- Seat & Handlebar -->
    <path d="M 23 35 L 37 35" />
    <path d="M 48 30 L 42 12 L 32 12" />
    <!-- Delivery Box or Wing -->
    <rect x="5" y="15" width="20" height="18" rx="3" stroke="#D4AF37" stroke-width="4" fill="#046A38" />
  </g>

  <!-- Title "OLOLU" -->
  <text x="256" y="420" fill="#D4AF37" font-family="'Inter', sans-serif" font-size="56" font-weight="900" letter-spacing="10" text-anchor="middle">OLOLU</text>
  <text x="256" y="450" fill="#FAFBF9" opacity="0.8" font-family="'Inter', sans-serif" font-size="16" font-weight="600" letter-spacing="2" text-anchor="middle">OJEK &amp; PENGANTARAN LUMAJANG</text>
</svg>
