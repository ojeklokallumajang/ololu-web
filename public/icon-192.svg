<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <rect width="192" height="192" rx="40" fill="#046A38" />
  <!-- Golden border pattern -->
  <rect x="8" y="8" width="176" height="176" rx="32" fill="none" stroke="#D4AF37" stroke-width="4" stroke-opacity="0.3" />
  
  <!-- Sleek motorcycle / courier icon in Gold -->
  <g transform="translate(46, 36) scale(1.3)" stroke="#D4AF37" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Wheel 1 -->
    <circle cx="15" cy="55" r="10" />
    <!-- Wheel 2 -->
    <circle cx="60" cy="55" r="10" />
    <!-- Frame -->
    <path d="M 15 55 L 30 30 L 48 30 L 60 55" />
    <!-- Seat & Handlebar -->
    <path d="M 23 35 L 37 35" />
    <path d="M 48 30 L 42 12 L 32 12" />
    <!-- Delivery Box or Wing -->
    <rect x="5" y="15" width="20" height="18" rx="3" stroke="#D4AF37" stroke-width="4" fill="#046A38" />
  </g>

  <!-- Title "OLOLU" -->
  <text x="96" y="160" fill="#D4AF37" font-family="'Inter', sans-serif" font-size="22" font-weight="900" letter-spacing="4" text-anchor="middle">OLOLU</text>
</svg>
